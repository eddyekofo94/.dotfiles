# move the rest of the prompt to the right
right_format = """
$cmd_duration
"""

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic yellow"

[aws]
symbol = "оҢҪ  "

[dart]
symbol = "оһҳ "

[docker_context]
symbol = "пҢҲ "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "оүө "

[git_branch]
format = "[о©Ё $branch]($style) "
style = "bright-black"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
staged = "[+${count}](green)"
modified = "[+${count}](yellow)"
deleted =  "[-${count}](red)"
conflicted =  "[~${count}](red)"
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
untracked = "[?${count}](blue)"
stashed = "[*${count}](green)"

[git_state]
style =	"bold red"
format = "[$state( $progress_current/$progress_total) ]($style)"
rebase = "rebase"
merge = "merge"
revert = "revert"
cherry_pick = "cherry"
bisect = "bisect"
am = "am"
am_or_rebase = "am/rebase"

[golang]
symbol = "оҳ§ "

[hg_branch]
symbol = "пҗҳ "

[java]
symbol = "оү– "

[julia]
symbol = "оҳӨ "

[haskell]
symbol = "О» "

[memory_usage]
symbol = "пЎҡ "

[nim]
symbol = "пҡӨ "

[nix_shell]
symbol = "пӢң "

[package]
symbol = "пЈ– "

[perl]
symbol = "оқ© "

[php]
symbol = "оҳҲ "

[python]
symbol = "рҹҗҚ "
#pyenv_version_name = true
format = 'via [${symbol}python (${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[ruby]
symbol = "оҲҫ "

[rust]
symbol = "оһЁ "

[scala]
symbol = "оң· "

[shlvl]
symbol = "п„  "

[swift]
symbol = "пҜЈ "

[nodejs]
format = "via [пўҳ Node.js $version](bold green) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]#format = """
#[в•ӯв”Җuserв”Җв”Җв”ҖвқҜ](bold blue) $username
#[в”Јв”Җsystemв”ҖвқҜ](bold yellow) $hostname
#[в”Јв”ҖprojectвқҜ](bold red) $directory$rust$git_branch$git_state$git_status$package$golang$terraform$docker_context$python$docker_context$nodejs
#[в•°в”Җcmdв”Җв”Җв”Җв”ҖвқҜ](bold green)
#"""
[username]
style_user = "green bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = true
show_always = true

[hostname]
ssh_only = false
format = 'on [$hostname](bold purple) '
trim_at = "."
disabled = true

# Replace the "вқҜ" symbol in the prompt with "вһң"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[вқҜ](bold green)"     # п…• The "success_symbol" segment is being set to "вһң" with the color "bold green"
error_symbol = "[вң—](bold red)"
vimcmd_symbol = "[вқ®](blue)"

# п”¶ п”ҙ
# configure directory
[directory]
read_only = " п Ҫ"
truncation_length = 10
before_repo_root_style = 'dimmed blue'
truncate_to_repo = true # truncates directory to root folder if in github repo
style = "bold blue"
