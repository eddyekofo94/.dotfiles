# Raise the per-command timeout from the 500ms default. In Swift projects the
# `swift` module shells out to /usr/bin/swift (an xcrun shim) which can exceed
# 500ms on a cold call, producing "command timed out" warnings.
command_timeout = 2000

# move the rest of the prompt to the right
right_format = """
$cmd_duration
"""

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic yellow"

[aws]
symbol = "¯î¢  "

[dart]
symbol = "¯×ÿ "

[docker_context]
symbol = "´îê "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "¯ëÁ "

[git_branch]
format = "[¯®¿ $branch]($style) "
style = "bright-black"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
staged = "[+${count}](green)"
modified = "[+${count}](yellow)"
deleted =  "[-${count}](red)"
conflicted =  "[~${count}](red)"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
untracked = "[?${count}](blue)"
stashed = "[*${count}](green)"

[git_state]
style =	"bold red"
format = "[$state( $progress_current/$progress_total) ]($style)"
rebase = "rebase"
merge = "merge"
revert = "revert"
cherry_pick = "cherry"
