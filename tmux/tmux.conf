# vim:ft=tmux:ts=4:sts=4:sw=4:et:fdm=marker:fmr=<<<,>>>:

### Default behavior <<<
# Tell Tmux that outside terminal supports true color + undercurl (usstyle).
# Modern `terminal-features` idiom (tmux 3.2+) replaces the old `Tc` override.
set -gq default-terminal 'tmux-256color'
set -as terminal-features ',*:RGB,*:usstyle'

# Let apps pass escape sequences straight through (inline images: image.nvim,
# kitty graphics, imgcat) and disambiguate key chords via CSI-u / kitty protocol.
set -gq allow-passthrough on
set -s  extended-keys on
set -as terminal-features ',*:extkeys'

# Propagate the active pane's title to the outer terminal's tab/window.
set -gq set-titles on
set -gq set-titles-string '#S:#I #W'

# Stop tmux from launching login shells every time when a new pane is created
set-hook -g session-created {
    set -gq default-command "$SHELL"
}

set -gq display-time 1024
set -gq history-limit 65536
set -gq renumber-windows on
set-hook -g window-linked 'move-window -r'

# Small (not 0) escape-time: avoids lagging Esc in vim while staying robust to
# mis-parsed escape/function-key sequences over SSH and with extended-keys.
set -s escape-time 10

# Start windows and panes from 1
set -gq base-index 1
setw -g pane-base-index 1
# >>>

### Mouse settings <<<
set -gq mouse on

### UI settings <<<
set -g status-position top
#>>>

### Popups (display-popup, tmux 3.2+) <<<
# Floating scratch shell in the current pane's directory
bind Enter display-popup -E -w 80% -h 80% -d '#{pane_current_path}'
# Floating lazygit (falls back to a shell if lazygit isn't installed)
bind g display-popup -E -w 85% -h 85% -d '#{pane_current_path}' \
    'command -v lazygit >/dev/null 2>&1 && lazygit || $SHELL'
#>>>

### Golden-ratio focus (focus.nvim style) <<<
# The active pane auto-grows to ~1/φ (62%) of the window; toggle with prefix + G.
# Needs focus-events so pane-focus-in fires on mouse/terminal focus changes.
set -gq focus-events on
set -g  @golden 0
# Apply only when enabled, with >1 pane, and not zoomed. Native percentage resize
# runs synchronously in the hook (no subprocess) so it lands in the same redraw
# as the focus change -- eliminates the flicker an async `run -b` would cause.
%hidden golden_apply="if -F '#{&&:#{==:#{@golden},1},#{&&:#{>:#{window_panes},1},#{!=:#{window_zoomed_flag},1}}}' 'resize-pane -x 62% -y 62%'"
# -g (replace, not -a/append) keeps re-sourcing idempotent.
set-hook -g pane-focus-in     "$golden_apply"
set-hook -g after-select-pane "$golden_apply"
bind G {
    set -Fg @golden '#{?#{==:#{@golden},1},0,1}'
    if -F '#{==:#{@golden},1}' {
        display 'Golden ratio: ON'
        if -F '#{&&:#{>:#{window_panes},1},#{!=:#{window_zoomed_flag},1}}' 'resize-pane -x 62% -y 62%'
    } {
        display 'Golden ratio: OFF'
        select-layout tiled
    }
}
#>>>

### System clipboard <<<
set -gq set-clipboard on
set -gq copy-command "sh -c 'if command -v termux-clipboard-set >/dev/null 2>&1; then \
    termux-clipboard-set; \
else \
    case \"\$(uname -s)\" in \
        Linux*) \
            [ \"\$XDG_SESSION_TYPE\" = x11 ] && \
                xclip -in -selection clipboard || \
                wl-copy ;; \
        Darwin*) \
            pbcopy ;; \
        MINGW*|CYGWIN*) \
            clip.exe ;; \
        Android*) \
            termux-clipboard-set ;; \
    esac \
fi'"

# Paste from system clipboard
%hidden paste_command="if command -v termux-clipboard-get >/dev/null 2>&1; then \
    termux-clipboard-get; \
else \
    case \"\$(uname -s)\" in \
        Linux*) \
            wl-paste --no-newline 2>/dev/null || \
                xclip -out -selection clipboard ;; \
        Darwin*) \
            pbpaste ;; \
        MINGW*|CYGWIN*) \
            powershell.exe Get-Clipboard ;; \
        Android*) \
            termux-clipboard-get ;; \
    esac \
fi | tmux load-buffer - && tmux paste-buffer -p"

bind ] run "sh -c '$paste_command'"
bind p run "sh -c '$paste_command'"
bind -T copy-mode-vi p { send -X cancel; run "sh -c '$paste_command'" }
#>>>

### Command aliases & enhancements <<<
set -s command-alias[100] show-pane-name='set -q pane-border-status top'
set -s command-alias[101] hide-pane-name='set -q pane-border-status off'
set -s command-alias[102] toggle-pane-name="if \
    '[ \"\$(tmux show pane-border-status)\" = \"pane-border-status off\" ]' \
    'show-pane-name' \
    'hide-pane-name'"
set -s command-alias[103] rename-pane='select-pane -T'
set -s command-alias[104] lock-pane="select-pane -d"
set -s command-alias[105] unlock-pane="select-pane -e"
set -s command-alias[106] reload-config="run \"tmux display -p '#{config_files}' | \
        tr ',' '\\n' | \
        while IFS= read -r file; do \
            [ -f \\\"\\\$file\\\" ] && tmux source \\\"\\\$file\\\"; \
        done\""
set -s command-alias[107] dump-history="run \
    'tmux command-prompt -p \"save history to file:\" \
            -I \"#{pane_current_path}/tmux-hist-\$(date +%Y-%m-%d-%H-%M-%S).txt\" \
        \"capture-pane -S - -E -; save-buffer %1; delete-buffer\"'"

# Colored choose-tree
set -s command-alias[108] choose-tree="choose-tree -F '#{?pane_format,\
#[fg=green]#{pane_current_command} #[fg=white]#{pane_title},\
#{?window_format,\
#[fg=yellow]#{?window_zoomed_flag,#[italics],}#{window_name}#{?#{==:#{window_panes},1}, \
#{?#{!=:#{?window_zoomed_flag,#[italics],}#{window_name},#[fg=green]#{pane_current_command}},\
#[fg=green]#{pane_current_command} ,}\
#[fg=white]#{pane_title},},\
#{?session_grouped, (group #{session_group}: #{session_group_list}),}\
#{?session_attached,#[fg=blue](attached),#[fg=magenta](unattached)}}}'"

# Rebind 'w' to the colored choose-tree command
bind w choose-tree -Zw
bind -n MouseDown1StatusRight if -F '#{pane_in_mode}' \
    { send q } \
    { choose-tree -Zw }

# Use fzf to select tmux windows
# Source: https://stackoverflow.com/a/38160854
%hidden list_windows="tmux list-windows -aF '##S:##I (##W)' | \
    sed -e 's/^\\\\([^:]*\\\\):/\\\\x1b[34m\\\\1\\\\x1b[0m:/' \
        -e 's/:\\\\([0-9]\\\\+\\\\) /:\\\\x1b[32m\\\\1\\\\x1b[0m /' \
        -e 's/(\\\\(.*\\\\))\$/(\\\\x1b[33m\\\\1\\\\x1b[0m)/'"

set -s command-alias[109] fzf-find-window="run -b \"$list_windows | \
    fzf --no-preview --ansi --color hl:reverse:-1,hl+:reverse:-1 \
        --prompt 'Tmux windows> ' \
        --tmux center,border-native,\
\\\$(w=\\\$(tmux display -p '#{window_width}'); echo \\\$(( w < 64 ? w : 64 ))),\
\\\$(h=\\\$(tmux display -p '#{window_height}'); echo \\\$(( h < 16 ? h : 16 ))) \
        --bind \\\"ctrl-x:execute(echo {+} | \
            sed 's/([^()]*)//g' | \
            sed 's/\\\\s\\\\+/\\\\n/g' | \
            tac | \
            xargs -I % tmux kill-window -t %)+reload($list_windows)\\\" | \
    tail -n1 | \
    sed 's/\\s*(.*)\$//' | \
    xargs -r tmux switch -t\""

if 'fzf --version' {
    bind f fzf-find-window
    bind -n M-C-f fzf-find-window
}

# Search for URIs in current pane, open current match with Enter
set -s command-alias[110] search-backward-uri="copy-mode; \
    send -X search-backward \
    '(https?://|git@|git://|ssh://|ftp://|file:///)[[:alnum:]?=%/_.:,;~@!#\$&()*+-]+|\
[^[:blank:]]*(/|\\.)[^[:blank:]]+|\
[^[:blank:]]+(/|\\.)[^[:blank:]]*|\
#?\<[[:xdigit:]]{6,}\>'"

bind-key -T copy-mode-vi \\ search-backward-uri

# Open a URL without the mouse (pure-keyboard route; complements Ghostty's
# Shift+click, which bypasses tmux mouse mode). While `mouse on` is set, Ghostty
# only opens links when Shift is held; these give a no-mouse alternative.
#
# In copy mode: put the cursor on/after a URL (e.g. via `\` above, or `?`/`/`),
# then press `O` to open the URL under the cursor. We momentarily narrow
# word-separators to whitespace only so the whole token is one "word", select
# it, then pipe it through grep to peel off any wrapping punctuation like
# `(https://x)` before handing the clean URL to `open`. `xargs -I{}` never runs
# `open` on empty input, so a non-URL word just does nothing.
bind -T copy-mode-vi O {
    set -g word-separators ' '
    send -X select-word
    send -X copy-pipe-and-cancel 'grep -oiE "https?://[^[:space:]]*[[:alnum:]/]" | head -n1 | xargs -I{} open {}'
    set -ug word-separators
}

# One-shot from normal mode: `prefix u` opens the last URL currently visible in
# the pane (bottom-most = most recent output), no copy mode needed. Scans the
# visible screen via capture-pane; grep keeps only well-formed URLs and drops
# trailing `).,;` so URLs sitting in prose still open cleanly. Says so if there
# is no URL on screen. run-shell always uses /bin/sh, so this is fish-safe.
bind u run-shell 'url=$(tmux capture-pane -p -J | grep -oiE "https?://[^[:space:]]*[[:alnum:]/]" | tail -n1); if [ -n "$url" ]; then open "$url"; tmux display-message "Opened $url"; else tmux display-message "prefix u: no URL on screen"; fi'

# Insert the newest labeled agent handoff without submitting it. Uppercase
# starts a fresh Codex context first; other agents fail closed until verified.
bind b run-shell -b '"$HOME/.dotfiles/tmux/scripts/ready_prompt.sh" "#{pane_id}"'
bind B run-shell -b '"$HOME/.dotfiles/tmux/scripts/ready_prompt.sh" --clear "#{pane_id}"'

# Extract current selection
set -s command-alias[111] extract-selection=" \
    set -gF @runtime_dir '\${XDG_RUNTIME_DIR:-\$TMPDIR}/tmux'; \
    set -pF @selection_file '#{@runtime_dir}/selection_#{pane_id}.txt'; \
    run 'mkdir -p \"#{@runtime_dir}\"'; \
    send -FX pipe 'cat > \"#{@selection_file}\"'; \
    run 'cat \"#{@selection_file}\"'"

# Show the copy-mode position indicator (top-right) so it is always obvious when
# a pane is in copy mode. A hidden (-H) copy mode is easy to enter by accident
# and get stuck in without realizing input is being captured.
set -s command-alias[112] copy-mode="copy-mode; \
    if -F '#{>=:#{copy_cursor_x},1}' { send -X cursor-left }"
bind [      copy-mode
bind PageUp copy-mode -u
bind -n MouseDrag1Pane if -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' 'send-keys -M' 'copy-mode -M'
bind -n WheelUpPane    if -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' 'send-keys -M' 'copy-mode -e'
# >>>

### Vim style key bindings <<<
# Use vim motion keys while in copy mode
set -gq mode-keys vi
set -gq status-keys emacs

%hidden is_shell="ps -o comm= -t '#{pane_tty}' | \
    tail -n1 | \
    grep -qE '((ba|da|fi|z)?sh)\$'"

# Confirm via display-menu rather than confirm-before. tmux paints a status-line
# prompt only as wide as the prompt text itself and leaves the rest of the line
# alone, so the window tabs stay visible right next to it -- no message-style
# background can cover them. A menu is a self-contained overlay, so the status
# line is untouched. y closes, n or Escape cancels.
%hidden close_menu="display-menu -T '#[align=centre,fg=#f38ba8]close pane?' -x R -y P \
    'Yes, close' y kill-pane \
    '' \
    'Cancel' n ''"

# Close outright only for a bare shell that is not the last pane in its window;
# a TUI (unsaved work) or the last pane always asks first.
%hidden kill_now="test '#{window_panes}' -gt 1 && $is_shell"

%hidden smart_close="if \"$kill_now\" \
    'kill-pane' \
    \"$close_menu\""

bind C-r choose-buffer
bind \"  choose-buffer
bind -T copy-mode-vi \" choose-buffer

bind n   split-window -v -c '#{pane_current_path}'
bind s   split-window -v -c '#{pane_current_path}'
bind v   split-window -h -c '#{pane_current_path}'
bind C-s split-window -v -c '#{pane_current_path}'
bind C-v split-window -h -c '#{pane_current_path}'
bind C-n new-window   -a -c '#{pane_current_path}'
bind C-o confirm 'kill-pane -a'
bind o confirm 'kill-pane -a'
bind O resize-pane -Z
bind c "$smart_close"
# Close whole tabs (windows). Parallels o/C-o for panes. Closing a single tab is
# instant; the destructive "close ALL other tabs" always confirms (no undo).
bind X   kill-window
bind C-x confirm -p "kill ALL OTHER windows? (y/n)" 'kill-window -a'
# No-prefix variants. M-X is guarded through $fwd so it reaches vim/TUI apps
# unharmed; M-C-x is unguarded, matching the other M-C-* bindings.
bind -n M-X   if "$fwd" 'send M-X' 'kill-window'
bind -n M-C-x confirm -p "kill ALL OTHER windows? (y/n)" 'kill-window -a'
bind -T copy-mode-vi M-X   kill-window
bind -T copy-mode-vi M-C-x confirm -p "kill ALL OTHER windows? (y/n)" 'kill-window -a'
bind N new-window -a -c "#{pane_current_path}"
bind T previous-window
bind t next-window
bind r swap-pane -D
bind R swap-pane -U
bind = select-layout tiled
# No regex syntax when doing incremental search :(
# https://github.com/tmux/tmux/issues/2205
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X begin-selection \; send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Y   send -X copy-line-and-cancel "pbcopy"
# Make cursor easier to follow: center cursor line instead of putting it at the
# top of screen after exiting nested copy mode, see `extract-selection` above.
# This can also happen after exiting from `list-keys` copy mode.
bind -T copy-mode-vi i   send -X cancel \; if -F '#{==:#{pane_mode},copy-mode}' 'send -X scroll-middle'
bind -T copy-mode-vi a   send -X cancel \; if -F '#{==:#{pane_mode},copy-mode}' 'send -X scroll-middle'
bind -T copy-mode-vi I   send -X cancel \; if -F '#{==:#{pane_mode},copy-mode}' 'send -X scroll-middle'
bind -T copy-mode-vi A   send -X cancel \; if -F '#{==:#{pane_mode},copy-mode}' 'send -X scroll-middle'
bind -T copy-mode-vi C-c send -X cancel \; if -F '#{==:#{pane_mode},copy-mode}' 'send -X scroll-middle'
bind -T copy-mode-vi u   send -X halfpage-up
bind -T copy-mode-vi d   send -X halfpage-down
bind -T copy-mode-vi m   send -X set-mark
bind -T copy-mode-vi _   send -X back-to-indentation
bind -T copy-mode-vi `   { send -X jump-to-mark; send -X set-mark; send -X scroll-middle }
bind -T copy-mode-vi \'  { send -X jump-to-mark; send -X set-mark; send -X scroll-middle }
# Shell integration, terminal emulator and the shell have to support OSC 133
bind -T copy-mode-vi [   send -X previous-prompt -o
bind -T copy-mode-vi ]   send -X next-prompt -o

# Use / or ? to extract selection so that we can search within,
# see `~/.vimrc`
bind-key -T copy-mode-vi M-/ if -F '#{selection_active}' extract-selection \; command-prompt -T search -p '(search down)' { send-keys -X search-forward '%%' }
bind-key -T copy-mode-vi M-? if -F '#{selection_active}' extract-selection \; command-prompt -T search -p '(search up)'   { send-keys -X search-backward '%%' }

# Use the vim motion keys to move between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use the vim motion keys to move between panes
# (handled by nvim plugin - see ~/.config/nvim/lua/plugin/tmux.lua)

# TUI apps that need Escape
%hidden running_tui="ps -o stat=,args= -t '#{pane_tty}' | grep -qE \
'S\\S*\\+\\s+(sudo.*\\s+)?(.*sh\s+-c\s+)?(.*python.*)?\\S*\
(n?vim?|vimdiff|emacs(client)?|lem|nano|h(eli)?x|kak|\
tmux|vifm|yazi|ranger|lazygit|h?top|gdb|fzf|nmtui|opencode|codex|claude|\
sudoedit|crontab|asciinema|w3m|python3?\s+-m|ssh)(\$|\\s+)'"

# Vim needs more extensive keymaps, e.g. M-h/j/k/l
%hidden running_vim="ps -o stat=,args= -t '#{pane_tty}' | grep -qE \
'S\\S*\\+\\s+(sudo.*\\s+)?(.*sh\s+-c\s+)?\\S*(n?vim?|vimdiff|ssh)(\$|\\s+)'"

# Single source of truth for the "forward this M-key to vim instead of acting on
# the tmux pane" guard. `fwd` also forwards while in copy-mode; `fwd_strict`
# (used by resize/arrow keys) only forwards to a live vim pane.
%hidden fwd="$running_vim && [ \$(tmux display -p '#{pane_input_off}') = 0 ] || [ \$(tmux display -p '#{pane_in_mode}') = 1 ]"
%hidden fwd_strict="$running_vim && [ \$(tmux display -p '#{pane_input_off}') = 0 ]"

bind -n M-Escape   copy-mode
bind -n C-M-Escape copy-mode
bind -n M-:   command-prompt
bind -n C-M-: command-prompt

# Smart escape -- default is to PASS Escape through to whatever app is running;
# only a bare shell prompt enters copy mode. This inverts the old allowlist
# approach (which broke for any app not in $running_tui, e.g. codex) so unknown
# TUIs can never trap you in copy mode. In copy mode, Escape sends q to exit.
# Use prefix + Escape to force-send a literal Escape to the app.
bind -n Escape if -F '#{pane_in_mode}' 'send q' { if "$is_shell" 'copy-mode' 'send Escape' }
bind Escape 'send Escape'

# Integration with TUI apps
bind -n M-h if "$fwd" 'send M-h' { if -F '#{pane_at_left}'   '' 'select-pane -L' }
bind -n M-j if "$fwd" 'send M-j' { if -F '#{pane_at_bottom}' '' 'select-pane -D' }
bind -n M-k if "$fwd" 'send M-k' { if -F '#{pane_at_top}'    '' 'select-pane -U' }
bind -n M-l if "$fwd" 'send M-l' { if -F '#{pane_at_right}'  '' 'select-pane -R' }
bind -T copy-mode-vi M-h if -F '#{pane_at_left}'   '' 'select-pane -L'
bind -T copy-mode-vi M-j if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind -T copy-mode-vi M-k if -F '#{pane_at_top}'    '' 'select-pane -U'
bind -T copy-mode-vi M-l if -F '#{pane_at_right}'  '' 'select-pane -R'

bind -n M-Left  if "$fwd_strict" 'send M-Left'  { if -F '#{pane_at_left}'   '' 'select-pane -L' }
bind -n M-Down  if "$fwd_strict" 'send M-Down'  { if -F '#{pane_at_bottom}' '' 'select-pane -D' }
bind -n M-Up    if "$fwd_strict" 'send M-Up'    { if -F '#{pane_at_top}'    '' 'select-pane -U' }
bind -n M-Right if "$fwd_strict" 'send M-Right' { if -F '#{pane_at_right}'  '' 'select-pane -R' }
bind -T copy-mode-vi M-Left  if -F '#{pane_at_left}'   '' 'select-pane -L'
bind -T copy-mode-vi M-Down  if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind -T copy-mode-vi M-Up    if -F '#{pane_at_top}'    '' 'select-pane -U'
bind -T copy-mode-vi M-Right if -F '#{pane_at_right}'  '' 'select-pane -R'

bind -n M-t if "$fwd" 'send M-t' 'select-pane -t 1'
bind -n M-w if "$fwd" 'send M-w' 'select-pane -t :.+'
bind -n M-W if "$fwd" 'send M-W' 'select-pane -t :.-'
bind -n M-n if "$fwd" 'send M-n' 'split-window -v -c "#{pane_current_path}"'
bind -n M-s if "$fwd" 'send M-s' 'split-window -v -c "#{pane_current_path}"'
bind -n M-v if "$fwd" 'send M-v' 'split-window -h -c "#{pane_current_path}"'
bind -n M-c if "$fwd" 'send M-c' "$smart_close"
bind -n M-q if "$fwd" 'send M-q' "$smart_close"
bind -n M-o if "$fwd" 'send M-o' "confirm 'kill-pane -a'"
bind -n M-r if "$fwd" 'send M-r' 'swap-pane -D'
bind -n M-R if "$fwd" 'send M-R' 'swap-pane -U'
bind -n M-p if "$fwd" 'send M-p' 'last-pane'
bind -n M-z if "$fwd" 'send M-z' 'resize-pane -Z'
bind -n M-= if "$fwd_strict" 'send M-=' 'select-layout tiled'
bind -T copy-mode-vi M-t select-pane -t 1
bind -T copy-mode-vi M-w select-pane -t :.+
bind -T copy-mode-vi M-W select-pane -t :.-
bind -T copy-mode-vi M-n split-window -v -c '#{pane_current_path}'
bind -T copy-mode-vi M-s split-window -v -c '#{pane_current_path}'
bind -T copy-mode-vi M-v split-window -h -c '#{pane_current_path}'
bind -T copy-mode-vi M-c "$smart_close"
bind -T copy-mode-vi M-q "$smart_close"
bind -T copy-mode-vi M-o confirm 'kill-pane -a'
bind -T copy-mode-vi M-r swap-pane -D
bind -T copy-mode-vi M-R swap-pane -U
bind -T copy-mode-vi M-p last-pane
bind -T copy-mode-vi M-z resize-pane -Z
bind -T copy-mode-vi M-= select-layout tiled

# Resize by 2 cells relative to current size. Defined once as command-aliases
# so the same name works in the prefix, root (M-), and copy-mode-vi tables.
set -s command-alias[113] shrink-width="run 'tmux resize-pane -x \$((\$(tmux display -p \"#{pane_width}\")  - 2))'"
set -s command-alias[114] grow-width="run 'tmux resize-pane -x \$((\$(tmux display -p \"#{pane_width}\")  + 2))'"
set -s command-alias[115] shrink-height="run 'tmux resize-pane -y \$((\$(tmux display -p \"#{pane_height}\") - 2))'"
set -s command-alias[116] grow-height="run 'tmux resize-pane -y \$((\$(tmux display -p \"#{pane_height}\") + 2))'"

bind -r < shrink-width
bind -r , shrink-width
bind -r > grow-width
bind -r . grow-width
bind -r - shrink-height
bind -r + grow-height

bind -n M-< if "$fwd_strict" 'send M-<' shrink-width
bind -n M-, if "$fwd_strict" 'send M-<' shrink-width
bind -n M-> if "$fwd_strict" 'send M->' grow-width
# bind -n M-. if "$fwd_strict" 'send M->' grow-width
bind -n M-- if "$fwd_strict" 'send M--' shrink-height
bind -n M-+ if "$fwd_strict" 'send M-+' grow-height
bind -T copy-mode-vi M-< shrink-width
bind -T copy-mode-vi M-, shrink-width
bind -T copy-mode-vi M-> grow-width
# bind -T copy-mode-vi M-. grow-width
bind -T copy-mode-vi M-- shrink-height
bind -T copy-mode-vi M-+ grow-height

bind -n M-C-h select-pane -L
bind -n M-C-j select-pane -D
bind -n M-C-k select-pane -U
bind -n M-C-l select-pane -R
bind -n M-C-z resize-pane -Z
bind -n M-C-o resize-pane -Z
