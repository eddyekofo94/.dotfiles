### Plugins <<<
# Register tpm plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# Official Catppuccin v2 (rewritten module/status API), pinned to a release tag.
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Catppuccin v2 theme options (note: `flavor`, not the old `flavour`).
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_number_position 'left'
set -g @catppuccin_window_current_text ' #{?#{@agent_status_rendered},#{E:@agent_status_rendered},#W}'
set -g @catppuccin_window_text ' #{?#{@agent_status_rendered},#{E:@agent_status_rendered},#W}'

# Agent hooks cache complete window labels in tmux options. A single animator
# refreshes only running labels at 12 FPS, avoiding tmux's one-second #() limit.
set -gu status-interval
run-shell -b 'python3 "$HOME/.dotfiles/tmux/scripts/agent_status.py" sync'

# Tpm plugin setups
set -g @resurrect-save 'C-s'
set -g @resurrect-restore 'C-z'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'off'
set -g @continuum-restore 'off'
set -g @continuum-save-interval '1'

if '[ -n "$XDG_DATA_HOME" ]' {
    setenv -g TMUX_DATA_HOME "$XDG_DATA_HOME/tmux"
    setenv -g TMUX_PLUGIN_MANAGER_PATH "$XDG_DATA_HOME/tmux/plugin"
} {
    setenv -g TMUX_DATA_HOME "$HOME/.local/share/tmux"
    setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugin"
}

# bootstrap tpm (tmux plugin manager)
set-hook -g session-created[1] {
    if '[ ! -f "$TMUX_DATA_HOME/no-bootstrap" -a ! -d "$TMUX_DATA_HOME/plugin/tpm" ]' {
        command-prompt -p 'Install tpm (tmux plugin manager)? [y]es/[n]o/[never]' {
            if -F "#{m/ri:(y|yes),%%}" {
                run 'mkdir -p "$TMUX_DATA_HOME/plugin" && \
                        git clone --filter=blob:none https://github.com/tmux-plugins/tpm "$TMUX_DATA_HOME/plugin/tpm" && \
                        "$TMUX_DATA_HOME/plugin/tpm/bin/install_plugins"'
                if '[ -x "$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm" ]' {
                    run "$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm"
                }
            } {
                if -F "#{m/ri:never,%%}" {
                    run 'mkdir -p "$TMUX_DATA_HOME" && \
                        touch "$TMUX_DATA_HOME/no-bootstrap" && \
                        echo "Tpm bootstrap disabled, remove '\''$TMUX_DATA_HOME/no-bootstrap'\'' to re-enable"'
                }
            }
        }
    }

    if '[ -x "$TMUX_PLUGIN_MANAGER_PATH/tmux-resurrect/scripts/restore.sh" -a \
            -s "$TMUX_DATA_HOME/resurrect/last" -a \
            -z "$TMUX_CONFIRMED_RESTORE" ]' {
        setenv -g TMUX_CONFIRMED_RESTORE 1
        command-prompt -p 'Restore previous session? (y/N)' {
            if -F "#{m/ri:(y|yes),%%}" {
                run '"$TMUX_PLUGIN_MANAGER_PATH"/tmux-resurrect/scripts/restore.sh'
            }
        }
    }

    # Run this hook only once
    set-hook -gu session-created[1]
}

if '[ -x "$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm" ]' {
    run "$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm"
}

# Catppuccin v2 status line. Assembled AFTER tpm sources the plugin so the
# `@catppuccin_status_*` modules exist. `#{E:...}` defers expansion to draw
# time, keeping it robust to load order.
if '[ -d "$TMUX_PLUGIN_MANAGER_PATH/tmux" ]' {
    set -g status-left-length 100
    set -g status-right-length 100
    set -g status-left  '#{E:@catppuccin_status_session}'
    set -g status-right '#{E:@catppuccin_status_application}'
    set -ag status-right '#{E:@catppuccin_status_host}'
}

# Catppuccin ships message-style with align=centre, but tmux still draws the
# prompt cursor at the left edge of the status line -- so confirm-before and
# command-prompt end up with the text centred and the cursor nowhere near it.
# Keep the colours, drop the alignment.
set -g message-style         'fg=#94e2d5,bg=default,align=left'
set -g message-command-style 'fg=#94e2d5,bg=default,align=left'

# Catppuccin styles only menu-selected-style; frame the rest to match it.
set -g menu-border-lines rounded
set -g menu-style        'fg=#cdd6f4,bg=#181825'
set -g menu-border-style 'fg=#45475a,bg=#181825'

# Re-source current config file once to activate plugins
if '[ -z "$TMUX_RESOURCED_CONFIG" ]' {
    setenv -g TMUX_RESOURCED_CONFIG 1
    run 'tmux source "#{current_file}"'
}
