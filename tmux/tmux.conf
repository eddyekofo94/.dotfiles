### Manage nested tmux sessions <<<
# - C-Space as prefix
# - M-C-Down toggles off all keybindings except for M-C-Up
#   (transfer control to inner session)
# - M-C-Up toggles keybindings back (regain control)
# Ref:
# https://www.freecodecamp.org/news/tmux-in-practice-local-and-nested-remote-tmux-sessions-4f7ba5db8795
# https://github.com/tmux/tmux/issues/237
# http://stahlke.org/dan/tmux-nested
set -gq prefix None
bind -n      C-a switchc -T prefix
bind         C-a  send-prefix
bind -n      M-C-Down {
    set key-table none
    if -F '#{==:#{status},off}' {
        display 'Keybinding passthrough ON'
    }
}
bind -T none M-C-Up {
    set -u key-table
    if -F '#{==:#{status},off}' {
        display 'Keybinding passthrough OFF'
    }
}
# Prevent sub-session from transferring control to sub-sub-session
# in which case it won't be able to regain control beaus the M-C-Up
# key will be captured by the main session
bind -T none M-C-Down display 'Already in passthrough mode'
bind -n      M-C-Up   display 'Already exited passthrough mode'
