# THROWAWAY PROTOTYPE — isolated from the production tmux configuration.

set -gF @prototype_root '#{d:current_file}'
set -g prefix C-a
unbind C-b
bind C-a send-prefix
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g status on
set -g status-position top
set -g status-interval 1
set -g status-style 'fg=#cdd6f4,bg=#11111b'
set -g status-left ''
set -g status-right '#[fg=#6c7086]Ctrl-a + n/r/q/p/g/f/x  '
set -g status-left-length 0
set -g status-right-length 48

set -g window-status-separator ' '
set -g window-status-format '#[fg=#cdd6f4,bg=#313244] #I #("#{E:@prototype_root}/render.sh" "#{window_id}") '
set -g window-status-current-format '#[fg=#cdd6f4,bg=#45475a,bold] #I #("#{E:@prototype_root}/render.sh" "#{window_id}") '

set -g pane-border-status top
set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#89b4fa'
set -g pane-border-format '#{?#{@prototype_agent}, #[fg=#cdd6f4]#{@prototype_agent}:#{@prototype_project} #[fg=#6c7086]state=#[fg=#f5c2e7]#{@prototype_state} ,}'

bind n run-shell '"#{E:@prototype_root}/event.sh" "#{pane_id}" start'
bind r run-shell '"#{E:@prototype_root}/event.sh" "#{pane_id}" prompt'
bind q run-shell '"#{E:@prototype_root}/event.sh" "#{pane_id}" question'
bind p run-shell '"#{E:@prototype_root}/event.sh" "#{pane_id}" permission'
bind g run-shell '"#{E:@prototype_root}/event.sh" "#{pane_id}" complete'
bind f run-shell '"#{E:@prototype_root}/event.sh" "#{pane_id}" fail'
bind x run-shell '"#{E:@prototype_root}/event.sh" "#{pane_id}" exit'
